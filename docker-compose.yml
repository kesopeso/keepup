services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    working_dir: /workspace
    command: >
      sh -c "pnpm --filter '@keepup/web' install &&
             pnpm --filter '@keepup/web' dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    depends_on:
      - api

  web-helper:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    profiles:
      - tools

  migrate:
    image: migrate/migrate:4
    entrypoint:
      - migrate
      - -path=/migrations
      - -database=postgres://keepup:keepup@postgres:5432/keepup?sslmode=disable
    command: ["up"]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    working_dir: /workspace/apps/api
    command: sh -c "air -c .air.toml"
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgres://keepup:keepup@postgres:5432/keepup?sslmode=disable
      DATABASE_STARTUP_TIMEOUT: 20s
      WEBSOCKET_AUTH_TIMEOUT: 5s
      DEFAULT_MAX_TRACKING_MEMBERS: 10
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: keepup
      POSTGRES_USER: keepup
      POSTGRES_PASSWORD: keepup
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepup -d keepup"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  go_build_cache:
  go_pkg_mod:
  postgres_data:
