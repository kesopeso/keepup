services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    working_dir: /workspace/apps/web
    command: sh -c "corepack enable && pnpm install && pnpm dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
      - web_next:/workspace/apps/web/.next
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    working_dir: /workspace/apps/api
    command: sh -c "air -c .air.toml"
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_URL: postgres://keepup:keepup@postgres:5432/keepup?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      - postgres

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: keepup
      POSTGRES_USER: keepup
      POSTGRES_PASSWORD: keepup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  go_build_cache:
  go_pkg_mod:
  postgres_data:
  web_next:
  web_node_modules:

